name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Spring servisleri (SMS deseni). Şu an sadece auth var.
  # Servis ekledikçe matrix'i büyüt: [auth, subscription, billing, payment, gateway]
  spring-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build & test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: ./mvnw -B verify
        # integration testleri Testcontainers ile gerçek Postgres/RabbitMQ kaldırır;
        # GitHub runner'da Docker mevcut, ek service container gerekmez.

