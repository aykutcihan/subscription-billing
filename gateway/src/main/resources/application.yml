server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**

cadence:
  auth:
    jwt:
      secret: ${JWT_SECRET:cadence-auth-service-dev-jwt-secret-please-override-in-production}
